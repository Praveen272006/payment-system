apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-app

  template:
    metadata:
      labels:
        app: payment-app

    spec:
      containers:
      - name: payment-app
        image: praveen272006/payment-system:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service

spec:
  type: NodePort
  selector:
    app: payment-app

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30008